name: On Code Change

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: yarn
      - run: yarn build
      - name: Publish to pkg.pr.new
        run: npx pkg-pr-new publish --compact --packageManager=yarn
      - run: yarn playwright install chromium --only-shell
      - run: yarn test
      - name: Run visual tests
        id: visual-tests
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'test:visual')
        run: |
          set +e
          NO_COLOR=1 yarn test:visual 2>&1 | tee visual-test-output.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> $GITHUB_OUTPUT
          exit "$status"
      - name: Collect failed visual screenshots
        id: collect-visual-screenshots
        if: failure() && steps.visual-tests.outcome == 'failure'
        run: |
          rm -rf visual-test-screenshots
          mkdir -p visual-test-screenshots/baseline visual-test-screenshots/current visual-test-screenshots/diff

          if [ ! -f visual-test-output.log ]; then
            echo "failed_tests=0" >> $GITHUB_OUTPUT
            echo "baseline_count=0" >> $GITHUB_OUTPUT
            echo "current_count=0" >> $GITHUB_OUTPUT
            echo "diff_count=0" >> $GITHUB_OUTPUT
            echo "artifact_ready=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          awk '
            /Reference screenshot:/ { mode = "reference"; next }
            /Actual screenshot:/ { mode = "actual"; next }
            /Diff image:/ { mode = "diff"; next }
            /Failure screenshots:/ { mode = "failure"; next }
            mode == "failure" && /^[[:space:]]*-[[:space:]]+/ {
              sub(/^[[:space:]]*-[[:space:]]+/, "")
              print mode "\t" $0
              next
            }
            mode != "failure" && /^[[:space:]]+/ {
              sub(/^[[:space:]]+/, "")
              print mode "\t" $0
              mode = ""
              next
            }
            { if (mode != "failure") mode = "" }
          ' visual-test-output.log | sort -u > visual-test-paths.tsv

          baseline_count=0
          current_count=0
          diff_count=0

          while IFS=$'\t' read -r kind file; do
            [ -n "$file" ] || continue
            [ -f "$file" ] || continue

            case "$kind" in
              reference)
                target_root="visual-test-screenshots/baseline"
                baseline_count=$((baseline_count + 1))
                ;;
              actual|failure)
                target_root="visual-test-screenshots/current"
                current_count=$((current_count + 1))
                ;;
              diff)
                target_root="visual-test-screenshots/diff"
                diff_count=$((diff_count + 1))
                ;;
              *)
                continue
                ;;
            esac

            target_path="$target_root/$file"
            mkdir -p "$(dirname "$target_path")"
            cp "$file" "$target_path"
          done < visual-test-paths.tsv

          failed_tests=$(awk -F '\t' '$1 == "reference" || $1 == "failure" { print $2 }' visual-test-paths.tsv | sort -u | wc -l | tr -d ' ')
          copied_files=$((baseline_count + current_count + diff_count))

          echo "failed_tests=$failed_tests" >> $GITHUB_OUTPUT
          echo "baseline_count=$baseline_count" >> $GITHUB_OUTPUT
          echo "current_count=$current_count" >> $GITHUB_OUTPUT
          echo "diff_count=$diff_count" >> $GITHUB_OUTPUT

          if [ "$copied_files" -gt 0 ]; then
            echo "artifact_ready=true" >> $GITHUB_OUTPUT
          else
            echo "artifact_ready=false" >> $GITHUB_OUTPUT
          fi
      - name: Upload failed visual screenshots
        id: upload-screenshots
        if: failure() && steps.visual-tests.outcome == 'failure' && steps.collect-visual-screenshots.outputs.artifact_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-screenshots-${{ github.run_id }}
          path: visual-test-screenshots/
          if-no-files-found: warn
          retention-days: 7
      - name: Summarize failed visual screenshots
        if: failure() && steps.visual-tests.outcome == 'failure'
        run: |
          echo "### Visual Test Screenshots" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Visual tests failed: **${{ steps.collect-visual-screenshots.outputs.failed_tests }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.collect-visual-screenshots.outputs.artifact_ready }}" = "true" ]; then
            echo "**[Download screenshots](${{ steps.upload-screenshots.outputs.artifact-url }})**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- \`baseline/\`: ${{ steps.collect-visual-screenshots.outputs.baseline_count }} reference screenshot(s)" >> $GITHUB_STEP_SUMMARY
            echo "- \`current/\`: ${{ steps.collect-visual-screenshots.outputs.current_count }} screenshot(s) captured during this failed run" >> $GITHUB_STEP_SUMMARY
            echo "- \`diff/\`: ${{ steps.collect-visual-screenshots.outputs.diff_count }} generated diff image(s)" >> $GITHUB_STEP_SUMMARY
          else
            echo "No screenshot files were collected from the visual test output." >> $GITHUB_STEP_SUMMARY
          fi
      - run: yarn lint

name: On Code Change

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: yarn
      - run: yarn build
      - name: Publish to pkg.pr.new
        run: npx pkg-pr-new publish --compact --packageManager=yarn
      - run: yarn playwright install chromium --only-shell
      - run: yarn test
      - name: Run visual tests
        id: visual-tests
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'test:visual')
        run: yarn test:visual
      - name: Upload screenshot diffs on failure
        if: failure() && steps.visual-tests.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-screenshots
          path: |
            src/__screenshots__/
            src/.vitest-attachments/**/*-actual.*
          include-hidden-files: true
          retention-days: 7
      - run: yarn lint

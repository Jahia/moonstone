name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch: null

jobs:
  publish-release:
    runs-on: ubuntu-slim
    permissions:
      contents: write
      id-token: write
    outputs:
      released_moonstone: ${{ steps.chachalog.outputs['released_@jahia/moonstone'] }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: Build and publish
        run: >
          corepack enable && yarn install

          yarn workspaces foreach -vv --all --topological-dev run build

          yarn workspaces foreach -vv --all --topological --no-private npm publish --access public
          --tolerate-republish --provenance
      - id: chachalog
        run: npx chachalog@^0.5.1 publish-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-storybook:
    needs: publish-release
    # only run when chachalog released @jahia/moonstone
    if: ${{ needs.publish-release.outputs.released_moonstone == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write      # required to deploy to GitHub Pages
      id-token: write   # required for OIDC authentication
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }} # displays deployed URL in Actions tab
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build the storybook
        run: |
          corepack enable && yarn install --immutable
          yarn build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # packages storybook-static for deployment
        with:
          path: storybook-static

      - name: Deploy to GitHub Pages
        id: deployment # id needed to expose page_url output
        uses: actions/deploy-pages@v4

name: On Code Change

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: yarn
      - run: yarn build
      - name: Publish to pkg.pr.new
        run: npx pkg-pr-new publish --compact --packageManager=yarn
      - run: yarn playwright install chromium --only-shell
      - run: yarn test
      - name: Run visual tests
        id: visual-tests
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'test:visual')
        run: yarn test:visual
      - name: Upload failed visual screenshots
        id: upload-screenshots
        if: failure() && steps.visual-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-screenshots-${{ github.run_id }}
          path: |
            src/__screenshots__/visual.spec.tsx
            .vitest-attachments
          if-no-files-found: warn
          retention-days: 7
      - name: Summarize failed visual screenshots
        if: failure() && steps.visual-tests.outcome == 'failure'
        run: |
          echo "### Visual Test Screenshots" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the artifact \`visual-test-screenshots-${{ github.run_id }}\` from this workflow run to inspect:" >> $GITHUB_STEP_SUMMARY
          echo "- baseline screenshots from \`src/__screenshots__/visual.spec.tsx\`" >> $GITHUB_STEP_SUMMARY
          echo "- actual and diff screenshots from \`.vitest-attachments\`" >> $GITHUB_STEP_SUMMARY
      - run: yarn lint

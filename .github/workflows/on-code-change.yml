name: On Code Change

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: yarn
      - run: yarn build
      - name: Publish to pkg.pr.new
        run: npx pkg-pr-new publish --compact --packageManager=yarn
      - run: yarn playwright install chromium --only-shell
      - run: yarn test
      - name: Run visual tests
        id: visual-tests
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'test:visual')
        run: yarn test:visual
      - name: Upload failed screenshots
        id: upload-screenshots
        if: failure() && steps.visual-tests.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-screenshots
          path: "**/.vitest-attachments/**/*-actual.*"
          include-hidden-files: true
          retention-days: 7
      - name: Visual test failure summary
        if: failure() && steps.visual-tests.conclusion == 'failure'
        run: |
          echo "### Visual regression tests failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**[Download screenshots](${{ steps.upload-screenshots.outputs.artifact-url }})**" >> $GITHUB_STEP_SUMMARY
      - run: yarn lint

name: Release

on:
  push:
    branches:
      - main
  release:
    types:
      - published
      - released
  workflow_dispatch: null

jobs:
  publish-release:
    if: ${{ github.event_name != 'release' }}
    runs-on: ubuntu-slim
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: Build and publish
        run: >
          corepack enable && yarn install

          yarn workspaces foreach -vv --all --topological-dev run build

          yarn workspaces foreach -vv --all --topological --no-private npm publish --access public
          --tolerate-republish --provenance
      - run: npx chachalog@^0.5.0 publish-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-storybook:
    if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Build the storybook
        run: |
          corepack enable && yarn install --immutable
          yarn build
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_STORYBOOK }}
          publish_dir: "storybook-static"
          commit_message: "Automated deployment - release ${{ github.event.release.tag_name }} - [skip ci]"

name: On Code Change

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: yarn
      - run: yarn build
      - name: Publish to pkg.pr.new
        run: npx pkg-pr-new publish --compact --packageManager=yarn
      - run: yarn playwright install chromium --only-shell
      - run: yarn test
      - name: Run visual tests
        id: visual-tests
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'test:visual')
        run: yarn test:visual
      - name: Collect failed screenshots
        if: failure() && steps.visual-tests.conclusion == 'failure'
        run: |
          while IFS= read -r actual; do
            subpath="${actual#src/.vitest-attachments/}"
            subdir=$(dirname "$subpath")
            filename=$(basename "$subpath")
            ext="${filename##*.}"
            name="${filename%-actual.$ext}"
            baseline="src/__screenshots__/$subdir/$name.$ext"
            destdir="src/failed-screenshots/$subdir"
            mkdir -p "$destdir"
            cp "$actual" "$destdir/$filename"
            [ -f "$baseline" ] && cp "$baseline" "$destdir/$name.$ext"
          done < <(find src/.vitest-attachments -name '*-actual.*' 2>/dev/null)
      - name: Upload failed screenshots
        if: failure() && steps.visual-tests.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-screenshots
          path: src/failed-screenshots/
          retention-days: 7
      - run: yarn lint
